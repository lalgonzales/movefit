name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pixi
        run: python -m pip install --upgrade pip && pip install pixi

      - name: Install package dependencies directly
        run: |
          python -m pip install -e .
          python -m pip install pytest hatchling

      - name: DB bootstrap
        run: pixi run python -c "from movefit import db; db.create_db_and_tables()"

      - name: Migrate database
        run: pixi run migrate

      - name: Run tests
        run: pixi run pytest -q

      - name: Run hatchling metadata
        run: pixi run python -m hatchling metadata

      - name: Run build sanity check
        run: pixi run python -m hatchling build

      - name: Pre-commit checks
        run: pixi run pre-commit run --all-files
