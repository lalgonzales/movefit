name: CI

on:
  push:
    branches:
      - main
      - master
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies for pipx/pixi
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pixi

      - name: Install pixi workspace packages
        run: |
          pixi install --locked

      - name: Migrate database
        run: pixi run migrate

      - name: Run tests
        run: pixi run test

      - name: Run ruff and black checks
        run: |
          pixi run ruff check .
          pixi run black --check .

      - name: Run hatchling metadata
        run: pixi run python -m hatchling metadata

      - name: Run build sanity check
        run: pixi run python -m hatchling build
